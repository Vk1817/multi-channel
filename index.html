<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CRICKCAST - TATA IPL 2026</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.3.5/shaka-player.ui.min.js"></script>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.3.5/controls.min.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    background: radial-gradient(circle at top, #1a0f2e, #05070a);
    font-family: 'Poppins', sans-serif;
    color: #fff;
}

/* FULL SCREEN AD CLICK */
#ad-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 9999;
    cursor: pointer;
    background: rgba(0,0,0,0);
}

.header {
    padding: 18px;
    text-align: center;
    font-size: 22px;
    font-weight: 700;
    color: #ff4ecd;
}

/* PLAYER CARD */
.player-card {
    width: 92%;
    margin: 10px auto;
    padding: 10px;
    border-radius: 20px;
    background: linear-gradient(145deg, #2a1740, #140b24);
}

/* VIDEO */
.video-container {
    width: 100%;
    aspect-ratio: 16/9;
    border-radius: 16px;
    overflow: hidden;
    background: #000;
}

video {
    width: 100%;
    height: 100%;
}

/* DROPDOWN */
#channelDropdown {
    width: 92%;
    margin: 10px auto;
    padding: 10px;
    background: #111;
    color: white;
    border: none;
}

/* LIVE */
.live-box {
    margin: 12px auto;
    width: 90px;
    text-align: center;
    padding: 6px;
    border-radius: 20px;
    background: rgba(255, 0, 0, 0.15);
    border: 1px solid red;
    font-size: 12px;
    color: red;
}

/* MATCH */
.match-title {
    text-align: center;
    font-size: 20px;
    font-weight: 600;
}

/* BANNER */
.ad-box {
    width: 92%;
    margin: 20px auto;
    border-radius: 15px;
    overflow: hidden;
}

.ad-box img {
    width: 100%;
}

/* INFO */
.info-card {
    width: 92%;
    margin: 12px auto;
    padding: 15px;
    border-radius: 16px;
    background: rgba(255,255,255,0.05);
}
</style>

</head>

<body>

<div id="ad-overlay" onclick="openAd()"></div>

<div class="header">TATA IPL 2026</div>

<select id="channelDropdown"></select>

<div class="player-card">
    <div class="video-container">
        <video id="videoPlayer" autoplay playsinline></video>
    </div>
</div>

<div class="live-box">● LIVE</div>
<div class="match-title">KKR vs MI</div>

<!-- ✅ WHATSAPP BANNER -->

<div class="ad-box">
    <a href="https://wa.me/447955881183" target="_blank">
        <img src="https://github.com/Vk1817/IPL1/blob/main/offstumphd.jpg?raw=true">
    </a>
</div>

<div class="info-card">
    <div>DATE: 29-03-2026</div>
</div>

<div class="info-card">
    <div>MATCH NO: 2 of 74</div>
</div>

<script>
const API_URL = "https://tv1.akcoder777.workers.dev";

let player;
let allChannels = [];
let currentChannel = null;

/* PRIORITY */
const priorityOrder = [
    "star sports 1 hindi hd",
    "star sports 2 hindi hd",
    "star sports 1hd",
    "star sports 2 hd",
    "star sports kannada",
    "star sports telugu",
    "star sports tamil"
];

/* INIT */
async function init() {
    const res = await fetch(API_URL);
    const data = await res.json();

    allChannels = data.filter(ch =>
        ch.channel_name.toLowerCase().includes("star sports")
    );

    // SORT
    allChannels.sort((a, b) => {
        const aName = a.channel_name.toLowerCase();
        const bName = b.channel_name.toLowerCase();

        const aIndex = priorityOrder.findIndex(p => aName.includes(p));
        const bIndex = priorityOrder.findIndex(p => bName.includes(p));

        if (aIndex !== -1 && bIndex !== -1) return aIndex - bIndex;
        if (aIndex !== -1) return -1;
        if (bIndex !== -1) return 1;

        return aName.localeCompare(bName);
    });

    createDropdown();

    loadChannel(allChannels[0]);
}

/* DROPDOWN */
function createDropdown() {
    const dropdown = document.getElementById("channelDropdown");

    allChannels.forEach((ch, i) => {
        const opt = document.createElement("option");
        opt.value = i;
        opt.text = ch.channel_name;
        dropdown.appendChild(opt);
    });

    dropdown.onchange = (e) => {
        loadChannel(allChannels[e.target.value]);
    };
}

/* LOAD CHANNEL */
async function loadChannel(channel) {
    currentChannel = channel;

    if (player) await player.destroy();

    const video = document.getElementById("videoPlayer");

    shaka.polyfill.installAll();
    player = new shaka.Player(video);
    new shaka.ui.Overlay(player, document.querySelector(".video-container"), video);

    video.muted = true;

    player.addEventListener("error", () => {
        setTimeout(() => loadChannel(currentChannel), 3000);
    });

    player.configure({
        drm: {
            clearKeys: {
                [channel.keyId]: channel.key
            }
        }
    });

    player.getNetworkingEngine().registerRequestFilter((type, request) => {
        request.headers["Referer"] = "https://www.jiotv.com/";

        if (channel.cookie) {
            request.headers["Cookie"] = channel.cookie;

            const match = channel.cookie.match(/__hdnea__=([^;]+)/);
            if (match) {
                const token = "__hdnea__=" + match[1];

                if (!request.uris[0].includes("__hdnea__")) {
                    request.uris[0] += (request.uris[0].includes("?") ? "&" : "?") + token;
                }
            }
        }
    });

    await player.load(channel.channel_url);
}

/* AD CLICK */
function openAd() {
    window.open("https://offstump.com/", "_blank");
    document.getElementById("ad-overlay").style.display = "none";
}

window.onload = init;
</script>

</body>
</html>
