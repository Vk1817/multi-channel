<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crickcast Player</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.3.5/shaka-player.ui.min.js"></script>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.3.5/controls.min.css">

<style>
body, html {
    margin: 0;
    padding: 0;
    height: 100%;
    background: black;
    font-family: sans-serif;
}

/* Dropdown */
#channelDropdown {
    width: 100%;
    padding: 12px;
    background: #111;
    color: white;
    border: none;
    font-size: 14px;
}

/* Video */
#videoContainer {
    width: 100%;
    height: calc(100% - 50px);
}

video {
    width: 100%;
    height: 100%;
}

/* Loader */
#loading {
    position: absolute;
    top: 45%;
    left: 50%;
    transform: translate(-50%, -50%);
    z-index: 10;
}

.spinner {
    border: 4px solid #ccc;
    border-top: 4px solid red;
    border-radius: 50%;
    width: 45px;
    height: 45px;
    animation: spin 1s linear infinite;
}

@keyframes spin {
    100% { transform: rotate(360deg); }
}
</style>

</head>

<body>

<select id="channelDropdown"></select>

<div id="loading"><div class="spinner"></div></div>

<div id="videoContainer">
    <video id="videoPlayer" autoplay playsinline></video>
</div>

<script>
const API_URL = "https://tv1.akcoder777.workers.dev";

let player;
let allChannels = [];
let currentChannel = null;

// ✅ YOUR PRIORITY ORDER
const priorityOrder = [
    "star sports 1 hindi hd",
    "star sports 2 hindi hd",
    "star sports 1hd",
    "star sports 2 hd",
    "star sports kannada",
    "star sports telugu",
    "star sports tamil"
];

async function init() {
    const res = await fetch(API_URL);
    const data = await res.json();

    // ✅ Filter Star Sports channels
    allChannels = data.filter(ch =>
        ch.channel_name.toLowerCase().includes("star sports")
    );

    // ✅ Sort with priority
    allChannels.sort((a, b) => {
        const aName = a.channel_name.toLowerCase();
        const bName = b.channel_name.toLowerCase();

        const aIndex = priorityOrder.findIndex(p => aName.includes(p));
        const bIndex = priorityOrder.findIndex(p => bName.includes(p));

        if (aIndex !== -1 && bIndex !== -1) return aIndex - bIndex;
        if (aIndex !== -1) return -1;
        if (bIndex !== -1) return 1;

        return aName.localeCompare(bName);
    });

    createDropdown();

    if (allChannels.length > 0) {
        loadChannel(allChannels[0]);
        document.getElementById("channelDropdown").selectedIndex = 0;
    }
}

function createDropdown() {
    const dropdown = document.getElementById("channelDropdown");
    dropdown.innerHTML = "";

    allChannels.forEach((ch, index) => {
        const option = document.createElement("option");
        option.value = index;
        option.text = ch.channel_name;
        dropdown.appendChild(option);
    });

    dropdown.onchange = (e) => {
        const selectedChannel = allChannels[e.target.value];
        loadChannel(selectedChannel);
    };
}

async function loadChannel(channel) {
    document.getElementById("loading").style.display = "block";
    currentChannel = channel;

    if (player) {
        await player.destroy();
    }

    const video = document.getElementById("videoPlayer");

    shaka.polyfill.installAll();

    player = new shaka.Player(video);
    new shaka.ui.Overlay(player, document.getElementById("videoContainer"), video);

    video.muted = true;

    // ✅ Auto reconnect
    player.addEventListener("error", () => {
        setTimeout(() => loadChannel(currentChannel), 3000);
    });

    player.configure({
        drm: {
            clearKeys: {
                [channel.keyId]: channel.key
            }
        },
        streaming: {
            lowLatencyMode: true,
            bufferingGoal: 8
        }
    });

    // ✅ Network filter
    player.getNetworkingEngine().registerRequestFilter((type, request) => {

        request.headers["Referer"] = "https://www.jiotv.com/";
        request.headers["User-Agent"] = "Mozilla/5.0";

        if (channel.cookie) {
            request.headers["Cookie"] = channel.cookie;

            const tokenMatch = channel.cookie.match(/__hdnea__=([^;]+)/);

            if (tokenMatch) {
                const token = "__hdnea__=" + tokenMatch[1];

                if (
                    type === shaka.net.NetworkingEngine.RequestType.SEGMENT ||
                    type === shaka.net.NetworkingEngine.RequestType.MANIFEST
                ) {
                    if (!request.uris[0].includes("__hdnea__")) {
                        const sep = request.uris[0].includes("?") ? "&" : "?";
                        request.uris[0] += sep + token;
                    }
                }
            }
        }
    });

    try {
        await player.load(channel.channel_url);
        document.getElementById("loading").style.display = "none";
    } catch {
        document.getElementById("loading").style.display = "none";
        alert("Stream failed");
    }
}

window.onload = init;
</script>

</body>
</html>
